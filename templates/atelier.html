<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Vent Marseille — AreaChart</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    #chart { width: 100%; height: 500px; }
  </style>
</head>

<body>

<h1>Vitesse du vent — Marseille</h1>
<div id="chart"></div>

<script>
  google.charts.load('current', { packages: ['corechart'] });
  google.charts.setOnLoadCallback(init);

  async function init() {
    const res = await fetch('/atelier-data');
    const json = await res.json();

    const rows = json.map(p => {
      const d = new Date(p.datetime);
      return [d, Number(p.value)];
    });

    drawChart(rows);
  }

  function drawChart(rows) {
    const data = new google.visualization.DataTable();
    data.addColumn('datetime', 'Date');
    data.addColumn('number', 'Vent (km/h)');
    data.addRows(rows);

    const options = {
      title: 'Vitesse du vent à Marseille',
      legend: { position: 'bottom' }
    };

    const chart = new google.visualization.AreaChart(document.getElementById('chart'));
    chart.draw(data, options);
  }
</script>

</body>
</html>
